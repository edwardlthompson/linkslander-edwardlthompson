repos:
  - repo: local
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: file-encoding
        name: Check UTF-8 file encoding
        entry: bash scripts/check-file-encoding.sh
        language: system
        pass_filenames: true
        files: (\.(md|json|yml|yaml|sh|ps1|mdc|ts|tsx|toml|html|css|properties|kts|kt|xml)$|^\.gitignore$)
      - id: workflow-action-refs
        name: Check workflow action ref format
        entry: bash scripts/check-workflow-action-ref-format.sh
        language: system
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
