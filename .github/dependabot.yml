version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /examples/web
    schedule:
      interval: weekly
    groups:
      web-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    groups:
      site-dependencies:
        patterns: ["*"]
