name: Health Check

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health:
    name: Weekly Workflow Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify CI + Security Scan + CodeQL green on HEAD
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/check-github-ci.sh "$(git rev-parse HEAD)"
